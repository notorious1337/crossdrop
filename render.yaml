services:
  - type: web
    name: crossdrop-signaling
    runtime: node
    rootDir: signaling-server
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true

  - type: static
    name: crossdrop-site
    rootDir: site
    buildCommand: >
      PUBLIC_SIGNALING_URL="wss://${SIGNALING_HOST}" npm install && npm run build
    publishPath: dist
    autoDeploy: true
    envVars:
      - key: SIGNALING_HOST
        fromService:
          type: web
          name: crossdrop-signaling
          property: host
